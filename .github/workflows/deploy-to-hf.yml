name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set git identity for the orphan commit
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Remove files not needed for deployment
          rm -rf data/ runs/ test_results/ sample_model_data/ notebooks/ yolov8n.pt *.png
          # Remove Flutter platform directories (only need Flask backend)
          rm -rf app/final_design/macos app/final_design/ios app/final_design/android app/final_design/windows app/final_design/linux app/final_design/web app/final_design/test
          # Use HF-specific README with Space configuration
          cp README_HF.md README.md
          # Create a fresh commit without history
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy to Hugging Face Spaces"
          git remote add hf https://huggingface.co/spaces/pelta-ai/pelta-ai-backend || true
          git remote set-url hf https://user:$HF_TOKEN@huggingface.co/spaces/pelta-ai/pelta-ai-backend
          git push hf hf-deploy:main --force
